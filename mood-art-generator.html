<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood Art Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #16161a;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #f0ede6;
      --muted: #6b6966;
      --accent: #d4a96a;
      --radius: 12px;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-mono: 'DM Mono', 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.7s ease both;
    }

    header h1 {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.1;
      color: var(--text);
    }

    header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    header p {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .container {
      width: 100%;
      max-width: 780px;
      animation: fadeUp 0.7s 0.1s ease both;
    }

    /* Mood buttons */
    .mood-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .mood-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }

    .mood-btn {
      padding: 8px 18px;
      border-radius: 100px;
      border: 0.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.04em;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .mood-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }

    .mood-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0e0e0f;
    }

    /* Canvas */
    .canvas-wrap {
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      border: 0.5px solid var(--border);
      background: #111;
      position: relative;
      margin-bottom: 16px;
    }

    #art {
      display: block;
      width: 100%;
    }

    /* Controls row */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
    }

    .left-controls { display: flex; gap: 10px; align-items: center; }

    .gen-btn, .export-btn {
      padding: 10px 22px;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.04em;
    }

    .gen-btn:active, .export-btn:active { transform: scale(0.97); }

    .gen-btn {
      background: var(--accent);
      border: none;
      color: #0e0e0f;
      font-weight: 400;
    }

    .gen-btn:hover { opacity: 0.88; }

    .export-btn {
      background: transparent;
      border: 0.5px solid var(--border-hover);
      color: var(--text);
    }

    .export-btn:hover { border-color: var(--text); }

    .seed-info {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* Caption */
    .caption {
      text-align: center;
      font-size: 13px;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.04em;
      min-height: 20px;
      transition: opacity 0.3s;
    }

    /* Footer */
    footer {
      margin-top: 64px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-align: center;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop {
      0%   { transform: scale(0.97); opacity: 0.7; }
      60%  { transform: scale(1.01); }
      100% { transform: scale(1);    opacity: 1; }
    }

    .canvas-wrap.generating { animation: pop 0.35s ease; }

    /* Responsive */
    @media (max-width: 520px) {
      body { padding: 32px 16px 60px; }
      .controls { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<header>
  <h1>Mood <em>Art</em> Generator</h1>
  <p>generative art · every piece is unique</p>
</header>

<div class="container">
  <p class="mood-label">Choose a mood</p>
  <div class="mood-row" id="mood-row"></div>

  <div class="controls">
    <div class="left-controls">
      <button class="gen-btn" onclick="generate()">Generate</button>
      <button class="export-btn" onclick="exportPNG()">Save PNG</button>
    </div>
    <span class="seed-info" id="seed-info"></span>
  </div>

  <div class="canvas-wrap" id="canvas-wrap">
    <svg id="art" viewBox="0 0 780 420" xmlns="http://www.w3.org/2000/svg" width="100%"></svg>
  </div>

  <p class="caption" id="caption"></p>
</div>

<footer>
  built with vanilla JS &amp; SVG &nbsp;·&nbsp;
  <a href="https://github.com/" target="_blank">github</a>
</footer>

<script>
const MOODS = {
  calm:       { palette: ["#B5D4F4","#85B7EB","#E6F1FB","#9FE1CB","#E1F5EE","#cce8f7"], shapes: "blobs",    caption: "still water, slow breath" },
  joyful:     { palette: ["#FAC775","#EF9F27","#F0997B","#F5C4B3","#C0DD97","#fde68a"], shapes: "burst",    caption: "sunbursts and laughter" },
  melancholy: { palette: ["#B4B2A9","#888780","#D3D1C7","#AFA9EC","#EEEDFE","#9b9890"], shapes: "drift",    caption: "fog rolling in at dusk" },
  electric:   { palette: ["#7F77DD","#534AB7","#AFA9EC","#5DCAA5","#1D9E75","#a78bfa"], shapes: "lines",    caption: "voltage through the air" },
  wild:       { palette: ["#D85A30","#D4537E","#BA7517","#3B6D11","#185FA5","#f59e0b"], shapes: "chaos",    caption: "every colour at once" },
  dreamy:     { palette: ["#CECBF6","#F4C0D1","#B5D4F4","#FAC775","#9FE1CB","#fce7f3"], shapes: "float",    caption: "half-remembered places" },
};

let currentMood = "calm";
let seed = Math.random() * 9999;

function rand(s) { const x = Math.sin(s) * 10000; return x - Math.floor(x); }
function sr(i)   { return rand(seed + i * 127.3); }

const W = 780, H = 420;

function buildButtons() {
  const row = document.getElementById("mood-row");
  Object.keys(MOODS).forEach(key => {
    const btn = document.createElement("button");
    btn.className = "mood-btn" + (key === currentMood ? " active" : "");
    btn.textContent = key;
    btn.onclick = () => {
      currentMood = key;
      document.querySelectorAll(".mood-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    };
    row.appendChild(btn);
  });
}

function generate() {
  seed = Math.random() * 99999;
  const mood = MOODS[currentMood];
  const svg = document.getElementById("art");
  svg.innerHTML = "";

  document.getElementById("caption").textContent = mood.caption;
  document.getElementById("seed-info").textContent = "seed · " + Math.floor(seed);

  const wrap = document.getElementById("canvas-wrap");
  wrap.classList.remove("generating");
  void wrap.offsetWidth;
  wrap.classList.add("generating");

  const pal = mood.palette;

  function el(tag, attrs) {
    const e = document.createElementNS("http://www.w3.org/2000/svg", tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    svg.appendChild(e);
    return e;
  }

  function col(i, alpha = 1) {
    const hex = pal[Math.floor(sr(i + 500) * pal.length)];
    if (alpha < 1) {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
    }
    return hex;
  }

  // Dark background tinted by palette
  const bgHex = pal[0];
  const bgR = Math.floor(parseInt(bgHex.slice(1,3),16) * 0.12);
  const bgG = Math.floor(parseInt(bgHex.slice(3,5),16) * 0.12);
  const bgB = Math.floor(parseInt(bgHex.slice(5,7),16) * 0.12);
  el("rect", { x:0, y:0, width:W, height:H, fill:`rgb(${bgR},${bgG},${bgB})` });

  const type = mood.shapes;

  if (type === "blobs") {
    for (let i = 0; i < 18; i++) {
      const cx = sr(i*3) * W, cy = sr(i*3+1) * H;
      const r = 50 + sr(i*3+2) * 160;
      el("ellipse", { cx, cy, rx: r, ry: r*(0.5+sr(i+100)*0.8), fill: col(i, 0.18+sr(i+200)*0.42),
        transform: `rotate(${sr(i+50)*180},${cx},${cy})` });
    }
    for (let i = 0; i < 8; i++) {
      el("circle", { cx: sr(i*7+20)*W, cy: sr(i*7+21)*H, r: 8+sr(i*7+22)*50, fill: col(i+14, 0.55+sr(i+300)*0.4) });
    }
  }

  if (type === "burst") {
    for (let i = 0; i < 10; i++) {
      const cx = sr(i*4)*W, cy = sr(i*4+1)*H;
      const spokes = 7 + Math.floor(sr(i*4+2)*12);
      const len = 40 + sr(i*4+3)*100;
      for (let j = 0; j < spokes; j++) {
        const a = (j/spokes)*Math.PI*2;
        const line = document.createElementNS("http://www.w3.org/2000/svg","line");
        line.setAttribute("x1",cx); line.setAttribute("y1",cy);
        line.setAttribute("x2",cx+Math.cos(a)*len); line.setAttribute("y2",cy+Math.sin(a)*len);
        line.setAttribute("stroke", col(i+j)); line.setAttribute("stroke-width", 1.5+sr(i+j+300)*4);
        line.setAttribute("stroke-linecap","round"); line.setAttribute("opacity", 0.5+sr(i*j+1)*0.5);
        svg.appendChild(line);
      }
      el("circle",{cx,cy,r:5+sr(i+10)*16,fill:col(i+20)});
    }
    for (let i = 0; i < 22; i++) {
      el("circle",{cx:sr(i*3+400)*W,cy:sr(i*3+401)*H,r:2+sr(i+402)*10,fill:col(i+30,0.7+sr(i+500)*0.3)});
    }
  }

  if (type === "drift") {
    for (let i = 0; i < 14; i++) {
      const y = (i/14)*H + sr(i)*40 - 20;
      const pts = [];
      for (let x = -20; x <= W+20; x += 25) {
        pts.push(`${x},${y + Math.sin(x/55 + sr(i+10)*6) * (25+sr(i+20)*55)}`);
      }
      const poly = document.createElementNS("http://www.w3.org/2000/svg","polyline");
      poly.setAttribute("points",pts.join(" "));
      poly.setAttribute("fill","none");
      poly.setAttribute("stroke",col(i));
      poly.setAttribute("stroke-width",0.8+sr(i+100)*3.5);
      poly.setAttribute("opacity",0.35+sr(i+200)*0.55);
      svg.appendChild(poly);
    }
    for (let i = 0; i < 10; i++) {
      el("ellipse",{cx:sr(i*5)*W,cy:sr(i*5+1)*H,rx:70+sr(i+50)*130,ry:8+sr(i+60)*28,fill:col(i+10,0.08)});
    }
  }

  if (type === "lines") {
    for (let i = 0; i < 50; i++) {
      const line = document.createElementNS("http://www.w3.org/2000/svg","line");
      line.setAttribute("x1",sr(i*4)*W); line.setAttribute("y1",sr(i*4+1)*H);
      line.setAttribute("x2",sr(i*4+2)*W); line.setAttribute("y2",sr(i*4+3)*H);
      line.setAttribute("stroke",col(i)); line.setAttribute("stroke-width",0.4+sr(i+100)*2.5);
      line.setAttribute("opacity",0.4+sr(i+200)*0.55);
      svg.appendChild(line);
    }
    for (let i = 0; i < 12; i++) {
      const cx = sr(i*3+300)*W, cy = sr(i*3+301)*H;
      for (let r = 6; r < 70; r += 12) {
        el("circle",{cx,cy,r,fill:"none",stroke:col(i+10),"stroke-width":"0.4",opacity:0.35});
      }
    }
  }

  if (type === "chaos") {
    for (let i = 0; i < 36; i++) {
      const t = Math.floor(sr(i+500)*3);
      if (t === 0) {
        el("rect",{x:sr(i*4)*W,y:sr(i*4+1)*H,width:12+sr(i*4+2)*140,height:12+sr(i*4+3)*100,
          fill:col(i,0.5+sr(i+100)*0.5), transform:`rotate(${sr(i+200)*90-45},${W/2},${H/2})`});
      } else if (t === 1) {
        el("circle",{cx:sr(i*3)*W,cy:sr(i*3+1)*H,r:10+sr(i*3+2)*70,fill:col(i+10,0.45+sr(i+300)*0.5)});
      } else {
        const cx=sr(i*5)*W, cy=sr(i*5+1)*H, n=3+Math.floor(sr(i+400)*5), r=20+sr(i*5+2)*80;
        const pts=[];
        for(let j=0;j<n;j++){const a=j/n*Math.PI*2;pts.push(`${cx+Math.cos(a)*r},${cy+Math.sin(a)*r}`);}
        const poly=document.createElementNS("http://www.w3.org/2000/svg","polygon");
        poly.setAttribute("points",pts.join(" ")); poly.setAttribute("fill",col(i+20,0.55));
        svg.appendChild(poly);
      }
    }
  }

  if (type === "float") {
    for (let i = 0; i < 24; i++) {
      const cx=sr(i*4)*W, cy=sr(i*4+1)*H, rx=25+sr(i*4+2)*120, ry=12+sr(i*4+3)*70;
      el("ellipse",{cx,cy,rx,ry,fill:col(i,0.15+sr(i+100)*0.4)});
    }
    for (let i = 0; i < 14; i++) {
      el("circle",{cx:sr(i*3+200)*W,cy:sr(i*3+201)*H,r:4+sr(i+202)*22,fill:col(i+20,0.6+sr(i+300)*0.4)});
    }
    for (let i = 0; i < 10; i++) {
      const path=document.createElementNS("http://www.w3.org/2000/svg","path");
      path.setAttribute("d",`M${sr(i*4+400)*W},${sr(i*4+401)*H} Q${sr(i*4+402)*W},${sr(i*4+403)*H} ${sr(i+500)*W},${sr(i+501)*H}`);
      path.setAttribute("fill","none"); path.setAttribute("stroke",col(i+30));
      path.setAttribute("stroke-width","1"); path.setAttribute("opacity","0.3");
      svg.appendChild(path);
    }
  }
}

function exportPNG() {
  const svg = document.getElementById("art");
  const serializer = new XMLSerializer();
  let svgStr = serializer.serializeToString(svg);

  // Fix namespace for standalone rendering
  if (!svgStr.includes("xmlns=")) {
    svgStr = svgStr.replace("<svg", '<svg xmlns="http://www.w3.org/2000/svg"');
  }

  const scale = 2;
  const canvas = document.createElement("canvas");
  canvas.width  = W * scale;
  canvas.height = H * scale;
  const ctx = canvas.getContext("2d");

  const img = new Image();
  const blob = new Blob([svgStr], { type: "image/svg+xml;charset=utf-8" });
  const url  = URL.createObjectURL(blob);

  img.onload = () => {
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    const a = document.createElement("a");
    a.download = `mood-art-${currentMood}-${Math.floor(seed)}.png`;
    a.href = canvas.toDataURL("image/png");
    a.click();
  };
  img.src = url;
}

buildButtons();
generate();
</script>
</body>
</html>
